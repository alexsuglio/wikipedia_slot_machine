<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wikipedia Article Slot Machine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bungee&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-glow bg-glow-a" aria-hidden="true"></div>
    <div class="bg-glow bg-glow-b" aria-hidden="true"></div>

    <main class="machine-wrap">
      <header class="title-block">
        <p class="kicker">Chance + Curiosity</p>
        <h1>Wikipedia Article Slot Machine</h1>
        <p class="subtitle">Pull the lever and let the internet choose your next rabbit hole.</p>
      </header>

      <section class="machine" aria-label="Slot machine">
        <div class="control-row">
          <label for="themeSelect" class="theme-label">Theme</label>
          <select id="themeSelect" class="theme-select" aria-label="Choose article theme">
            <option value="all">Anything</option>
            <option value="history">History</option>
            <option value="science">Science</option>
            <option value="sports">Sports</option>
            <option value="technology">Technology</option>
            <option value="arts">Arts</option>
          </select>

          <button id="soundToggle" class="sound-toggle" type="button" aria-pressed="true">Sound: On</button>
        </div>

        <div class="reel-window" aria-live="polite">
          <div class="reel" id="reel-1">Ready</div>
          <div class="reel" id="reel-2">Set</div>
          <div class="reel" id="reel-3">Spin</div>
        </div>

        <div class="controls">
          <button id="leverBtn" class="lever-btn" type="button" aria-label="Pull lever to spin">
            <span class="lever-stick" aria-hidden="true"></span>
            <span class="lever-knob" aria-hidden="true"></span>
            <span class="lever-text">Pull Lever</span>
          </button>
        </div>
      </section>

      <section class="result" id="result">
        <h2 id="articleTitle">Waiting for your first spin...</h2>
        <p id="articleExtract">No API keys, no logins, just random knowledge.</p>
        <a id="articleLink" class="article-link" href="https://en.wikipedia.org/wiki/Special:Random" target="_blank" rel="noopener noreferrer">
          Open Wikipedia
        </a>
      </section>

      <p id="statusLine" class="status">Idle</p>
    </main>

    <script src="app.js" defer></script>
  </body>
</html>
